<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RC Car Position Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }
        .map-container {
            background: #16213e;
            border-radius: 12px;
            padding: 15px;
            position: relative;
        }
        .map-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        #mapCanvas {
            width: 100%;
            border-radius: 8px;
            background: #0f0f23;
        }
        .info-panel {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
        }
        .info-section {
            margin-bottom: 25px;
        }
        .info-section h3 {
            color: #00d4ff;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #222;
        }
        .info-label {
            color: #888;
        }
        .info-value {
            font-weight: bold;
            font-family: 'Consolas', monospace;
        }
        .info-value.x { color: #ff6b6b; }
        .info-value.y { color: #4ecdc4; }
        .info-value.theta { color: #ffe66d; }
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #0f0f23;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            animation: pulse 1.5s infinite;
        }
        .status-dot.connected {
            background: #44ff44;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .coordinate-display {
            background: #0f0f23;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            margin-bottom: 15px;
        }
        .coordinate-display .big-value {
            font-size: 28px;
            font-weight: bold;
            font-family: 'Consolas', monospace;
        }
        .uncertainty {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .history-log {
            background: #0f0f23;
            border-radius: 8px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 11px;
        }
        .history-log .entry {
            padding: 3px 0;
            color: #666;
        }
        .history-log .entry:last-child {
            color: #00d4ff;
        }
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-size: 12px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .legend-color.robot { background: #00ff00; }
        .legend-color.trail { background: #00d4ff; }
        .legend-color.arrow { background: #ff6b6b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>RC Car Real-time Position Viewer</h1>

        <div class="grid">
            <div class="map-container">
                <div class="map-wrapper">
                    <canvas id="mapCanvas"></canvas>
                </div>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color robot"></div>
                        <span>Current Position</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color trail"></div>
                        <span>Trail</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color arrow"></div>
                        <span>Direction</span>
                    </div>
                </div>
            </div>

            <div class="info-panel">
                <div class="status">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">Waiting for data...</span>
                </div>

                <div class="info-section">
                    <h3>Current Position</h3>
                    <div class="coordinate-display">
                        <div>X Position</div>
                        <div class="big-value x" id="posX">0.000</div>
                        <div class="uncertainty" id="uncX">-</div>
                    </div>
                    <div class="coordinate-display">
                        <div>Y Position</div>
                        <div class="big-value y" id="posY">0.000</div>
                        <div class="uncertainty" id="uncY">-</div>
                    </div>
                    <div class="coordinate-display">
                        <div>Heading</div>
                        <div class="big-value theta" id="posTheta">0.0</div>
                    </div>
                </div>

                <div class="info-section">
                    <h3>Map Info</h3>
                    <div class="info-row">
                        <span class="info-label">Resolution</span>
                        <span class="info-value" id="mapRes">0.05 m/px</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Size</span>
                        <span class="info-value" id="mapSize">- x -</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Origin</span>
                        <span class="info-value" id="mapOrigin">(-10.0, -10.0)</span>
                    </div>
                </div>

                <div class="info-section">
                    <h3>Position Log</h3>
                    <div class="history-log" id="historyLog">
                        <div class="entry">Waiting for position data...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');

        let mapImage = null;
        let mapInfo = {
            resolution: 0.05,
            origin: [-10.0, -10.0, 0],
            width: 400,
            height: 400
        };
        let positionHistory = [];
        let lastUpdate = 0;

        // 맵 이미지 로드
        async function loadMap() {
            try {
                const response = await fetch('/api/map_info');
                mapInfo = await response.json();
                document.getElementById('mapRes').textContent = `${mapInfo.resolution} m/px`;
                document.getElementById('mapSize').textContent = `${mapInfo.width} x ${mapInfo.height}`;
                document.getElementById('mapOrigin').textContent =
                    `(${mapInfo.origin[0]}, ${mapInfo.origin[1]})`;
            } catch (e) {
                console.log('Using default map info');
            }

            // PGM 이미지를 canvas에 그리기 위해 fetch
            try {
                const response = await fetch('/map.pgm');
                const buffer = await response.arrayBuffer();
                const data = new Uint8Array(buffer);

                // PGM 파싱 (P5 format)
                let idx = 0;
                let header = '';
                let headerLines = 0;

                while (headerLines < 3) {
                    if (data[idx] === 10) { // newline
                        headerLines++;
                    }
                    header += String.fromCharCode(data[idx]);
                    idx++;
                }

                const lines = header.trim().split('\n');
                const dims = lines[1].split(' ');
                const width = parseInt(dims[0]);
                const height = parseInt(dims[1]);

                mapInfo.width = width;
                mapInfo.height = height;

                canvas.width = width;
                canvas.height = height;

                // 이미지 데이터 생성
                const imageData = ctx.createImageData(width, height);
                for (let i = 0; i < width * height; i++) {
                    const val = data[idx + i];
                    imageData.data[i * 4] = val;
                    imageData.data[i * 4 + 1] = val;
                    imageData.data[i * 4 + 2] = val;
                    imageData.data[i * 4 + 3] = 255;
                }

                // 캔버스에 저장
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = width;
                tempCanvas.height = height;
                tempCanvas.getContext('2d').putImageData(imageData, 0, 0);

                mapImage = new Image();
                mapImage.src = tempCanvas.toDataURL();
                mapImage.onload = () => {
                    console.log('Map loaded:', width, 'x', height);
                    document.getElementById('mapSize').textContent = `${width} x ${height}`;
                    draw();
                };

            } catch (e) {
                console.error('Failed to load map:', e);
                canvas.width = mapInfo.width;
                canvas.height = mapInfo.height;
                ctx.fillStyle = '#333';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#666';
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Map not available - Save a map first', canvas.width/2, canvas.height/2);
            }
        }

        // 월드 좌표 -> 픽셀 좌표 변환
        function worldToPixel(x, y) {
            const px = (x - mapInfo.origin[0]) / mapInfo.resolution;
            const py = mapInfo.height - (y - mapInfo.origin[1]) / mapInfo.resolution;
            return { x: px, y: py };
        }

        // 그리기
        function draw(position = null) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 맵 그리기
            if (mapImage) {
                ctx.drawImage(mapImage, 0, 0);
            } else {
                ctx.fillStyle = '#333';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // 이동 경로 그리기
            if (positionHistory.length > 1) {
                ctx.beginPath();
                ctx.strokeStyle = '#00d4ff';
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.7;

                for (let i = 0; i < positionHistory.length; i++) {
                    const pos = worldToPixel(positionHistory[i].x, positionHistory[i].y);
                    if (i === 0) {
                        ctx.moveTo(pos.x, pos.y);
                    } else {
                        ctx.lineTo(pos.x, pos.y);
                    }
                }
                ctx.stroke();
                ctx.globalAlpha = 1.0;
            }

            // 현재 위치 그리기
            if (position) {
                const pos = worldToPixel(position.x, position.y);
                const theta = position.theta_rad || (position.theta * Math.PI / 180);

                // 로봇 원
                ctx.beginPath();
                ctx.fillStyle = '#00ff00';
                ctx.arc(pos.x, pos.y, 8, 0, Math.PI * 2);
                ctx.fill();

                // 방향 화살표
                const arrowLength = 25;
                const arrowX = pos.x + Math.cos(-theta + Math.PI/2) * arrowLength;
                const arrowY = pos.y + Math.sin(-theta + Math.PI/2) * arrowLength;

                ctx.beginPath();
                ctx.strokeStyle = '#ff6b6b';
                ctx.lineWidth = 3;
                ctx.moveTo(pos.x, pos.y);
                ctx.lineTo(arrowX, arrowY);
                ctx.stroke();

                // 화살표 머리
                const headLen = 8;
                const angle = Math.atan2(arrowY - pos.y, arrowX - pos.x);
                ctx.beginPath();
                ctx.moveTo(arrowX, arrowY);
                ctx.lineTo(arrowX - headLen * Math.cos(angle - Math.PI/6),
                          arrowY - headLen * Math.sin(angle - Math.PI/6));
                ctx.moveTo(arrowX, arrowY);
                ctx.lineTo(arrowX - headLen * Math.cos(angle + Math.PI/6),
                          arrowY - headLen * Math.sin(angle + Math.PI/6));
                ctx.stroke();

                // 불확실성 원 (있는 경우)
                if (position.uncertainty) {
                    const uncRadius = Math.max(position.uncertainty.x, position.uncertainty.y) / mapInfo.resolution;
                    if (uncRadius > 0 && uncRadius < 100) {
                        ctx.beginPath();
                        ctx.strokeStyle = 'rgba(255, 255, 0, 0.5)';
                        ctx.lineWidth = 1;
                        ctx.arc(pos.x, pos.y, uncRadius * 10, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                }
            }
        }

        // 위치 업데이트
        async function updatePosition() {
            try {
                const response = await fetch('/api/position');
                const data = await response.json();

                if (data.timestamp && data.timestamp !== lastUpdate) {
                    lastUpdate = data.timestamp;

                    // UI 업데이트
                    document.getElementById('posX').textContent = data.x.toFixed(3) + ' m';
                    document.getElementById('posY').textContent = data.y.toFixed(3) + ' m';
                    document.getElementById('posTheta').textContent = data.theta.toFixed(1) + ' deg';

                    if (data.uncertainty) {
                        document.getElementById('uncX').textContent = `uncertainty: +/- ${data.uncertainty.x.toFixed(3)} m`;
                        document.getElementById('uncY').textContent = `uncertainty: +/- ${data.uncertainty.y.toFixed(3)} m`;
                    }

                    // 상태 업데이트
                    document.getElementById('statusDot').classList.add('connected');
                    document.getElementById('statusText').textContent =
                        `Connected - Last update: ${new Date().toLocaleTimeString()}`;

                    // 히스토리 추가
                    positionHistory.push({x: data.x, y: data.y, theta: data.theta});
                    if (positionHistory.length > 100) {
                        positionHistory = positionHistory.slice(-100);
                    }

                    // 로그 업데이트
                    const log = document.getElementById('historyLog');
                    const entry = document.createElement('div');
                    entry.className = 'entry';
                    entry.textContent = `[${new Date().toLocaleTimeString()}] x=${data.x.toFixed(2)}, y=${data.y.toFixed(2)}, theta=${data.theta.toFixed(1)}`;
                    log.appendChild(entry);
                    log.scrollTop = log.scrollHeight;

                    // 오래된 로그 제거
                    while (log.children.length > 50) {
                        log.removeChild(log.firstChild);
                    }

                    // 맵 다시 그리기
                    draw(data);
                }
            } catch (e) {
                document.getElementById('statusDot').classList.remove('connected');
                document.getElementById('statusText').textContent = 'Connection error';
            }
        }

        // 초기화
        loadMap();
        setInterval(updatePosition, 200);  // 5Hz 업데이트
    </script>
</body>
</html>
